<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Projects</title>

  <style>
    body {
      font-family: "Segoe UI", sans-serif;
      background: #fef6ff;
      color: #4b4453;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      text-align: center;
      background: #ffffff;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      width: 300px;
    }

    h1 {
      margin-bottom: 25px;
      color: #6d597a;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      margin: 12px 0;
    }

    a {
      text-decoration: none;
      display: block;
      padding: 12px;
      border-radius: 10px;
      background: #ffd6e0;
      color: #6d597a;
      font-weight: 500;
      transition: 0.3s;
    }

    a:hover {
      background: #ffb3c6;
      transform: scale(1.05);
    }
  </style>

</head>
<body>

  <div class="container">
    <h1>My Projects</h1>

    <ul>
      <li>
        <a href="01_intractive_quiz_game/">Interactive Quiz Game</a>
      </li>
    </ul>
  </div>

</body>
</html>
